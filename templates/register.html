<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Better Transcripts</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.90em%22 font-size=%2290%22>💬</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <script src="/static/js/htmx.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/tailwind-config.js"></script>
</head>
<body class="bg-flexoki-ui min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-auto bg-flexoki-paper-light rounded-lg border border-flexoki-ui-3 p-6 text-center shadow-sm">
        <h1 class="text-2xl font-bold text-center mb-6 text-flexoki-tx">Register for Better Transcripts</h1>
        
        <form id="register-form" class="space-y-4">
            <div>
                <label for="name" class="block text-md font-medium text-flexoki-tx-2 mb-2 text-left">Full Name</label>
                <input 
                    type="text" 
                    id="name"
                    name="name" 
                    required
                    class="w-full px-3 py-2 border border-flexoki-ui-3 bg-flexoki-paper rounded-md focus:outline-none focus:ring-2 focus:ring-flexoki-bl focus:border-flexoki-bl">
            </div>
            
            <div>
                <label for="email" class="block text-md font-medium text-flexoki-tx-2 mb-2 text-left">Email</label>
                <input 
                    type="email" 
                    id="email"
                    name="email" 
                    required
                    class="w-full px-3 py-2 border border-flexoki-ui-3 bg-flexoki-paper rounded-md focus:outline-none focus:ring-2 focus:ring-flexoki-bl focus:border-flexoki-bl">
            </div>
            
            <div>
                <label for="password" class="block text-md font-medium text-flexoki-tx-2 mb-2 text-left">Password</label>
                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    required
                    class="w-full px-3 py-2 border border-flexoki-ui-3 bg-flexoki-paper rounded-md focus:outline-none focus:ring-2 focus:ring-flexoki-bl focus:border-flexoki-bl">
            </div>
            
            <button 
                type="submit"
                class="w-full bg-flexoki-bl hover:bg-flexoki-bl-2 text-flexoki-paper font-bold py-2 px-4 rounded transition duration-300">
                Register
            </button>
        </form>
        
        <div id="register-result" class="mt-4"></div>
        
        <div class="mt-6 text-center">
            <p class="text-sm text-flexoki-tx-3">
                Already have an account? 
                <a href="/login" class="text-flexoki-bl hover:text-flexoki-bl-2 font-medium">Login here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    document.getElementById('register-result').innerHTML = 
                        `<div class='text-green-600 font-semibold'>✅ Registration successful! You can now <a href="/login" class="underline">login</a>.</div>`;
                    document.getElementById('register-form').reset();
                } else {
                    const error = await response.json();
                    document.getElementById('register-result').innerHTML = 
                        `<div class='text-red-600 font-semibold'>❌ Registration failed: ${error.detail || 'Please try again.'}</div>`;
                }
            } catch (error) {
                document.getElementById('register-result').innerHTML = 
                    `<div class='text-red-600 font-semibold'>❌ An error occurred. Please try again.</div>`;
            }
        });
    </script>
</body>
</html>
