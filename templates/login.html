{% extends "base.html" %}

{% block title %}Login - Better Transcripts{% endblock %}

{% block auth_trigger %}{% endblock %}

{% block main_content_attrs %}{% endblock %}

{% block content %}
<div class="max-w-md w-full mx-auto bg-flexoki-paper-light rounded-lg border border-flexoki-ui-3 p-6 text-center shadow-sm">
    <h1 class="text-2xl font-bold text-center mb-6 text-flexoki-tx">Login to Better Transcripts</h1>

    <form id="login-form" class="space-y-4">
        <div>
            <label for="username" class="block text-md font-medium text-flexoki-tx-2 mb-2 text-left">Email</label>
            <input
                type="email"
                id="username"
                name="username"
                required
                class="w-full px-3 py-2 border border-flexoki-ui-3 bg-flexoki-paper rounded-md focus:outline-none focus:ring-2 focus:ring-flexoki-bl focus:border-flexoki-bl">
        </div>

        <div>
            <label for="password" class="block text-md font-medium text-flexoki-tx-2 mb-2 text-left">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                required
                class="w-full px-3 py-2 border border-flexoki-ui-3 bg-flexoki-paper rounded-md focus:outline-none focus:ring-2 focus:ring-flexoki-bl focus:border-flexoki-bl">
        </div>

        <button
            type="submit"
            class="w-full bg-flexoki-bl hover:bg-flexoki-bl-2 text-flexoki-paper font-bold py-2 px-4 rounded transition duration-300">
            Login
        </button>
    </form>

    <div id="login-result" class="mt-4"></div>

    <div class="mt-6 text-center">
        <p class="text-sm text-flexoki-tx-3">
            Don't have an account?
            <a href="/register" class="text-flexoki-bl hover:text-flexoki-bl-2 font-medium">Register here</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const formData = new FormData(e.target);

        try {
            const response = await fetch('/auth/jwt/login', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                // Small delay to ensure cookie is set
                setTimeout(() => {
                    window.location.href = '/';
                }, 100);
            } else {
                const error = await response.text();
                document.getElementById('login-result').innerHTML =
                    `<div class='text-red-600 font-semibold'>❌ Login failed. Please check your credentials.</div>`;
            }
        } catch (error) {
            document.getElementById('login-result').innerHTML =
                `<div class='text-red-600 font-semibold'>❌ An error occurred. Please try again.</div>`;
        }
    });
</script>
{% endblock %}
